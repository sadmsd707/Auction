<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audience Zone | IPL Auction 2026 Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .live-badge {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .bid-update {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black text-white mb-2">
                🏏 IPL Auction 2026
            </h1>
            <p class="text-gray-300">Live Audience Zone • Real-time Updates</p>
            <div class="inline-flex items-center gap-2 mt-4 bg-red-500 px-4 py-2 rounded-full">
                <div class="w-2 h-2 bg-white rounded-full live-badge"></div>
                <span class="text-white font-bold text-sm">LIVE AUCTION</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Current Auction -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-6 py-4">
                        <h2 class="text-2xl font-bold text-white">Current Auction Status</h2>
                    </div>
                    <div class="p-6">
                        <div class="text-center py-8">
                            <p class="text-gray-500 text-lg">Player on Auction:</p>
                            <p class="text-4xl font-bold text-indigo-600 mt-2" id="activePlayer">—</p>
                            <div class="mt-6 grid grid-cols-2 gap-4">
                                <div class="bg-gray-100 rounded-xl p-4">
                                    <p class="text-gray-500 text-sm">Current Bid</p>
                                    <p class="text-2xl font-bold text-green-600" id="currentBid">₹0</p>
                                </div>
                                <div class="bg-gray-100 rounded-xl p-4">
                                    <p class="text-gray-500 text-sm">Timer</p>
                                    <p class="text-3xl font-bold text-orange-500 timer-font" id="timerValue">00:00</p>
                                </div>
                            </div>
                            <div class="mt-4 bg-yellow-50 rounded-xl p-3">
                                <p class="text-sm text-gray-600">Highest Bidder: <span id="highestBidder" class="font-bold text-purple-600">None</span></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Bids -->
                <div class="bg-white rounded-2xl shadow-2xl overflow-hidden mt-6">
                    <div class="bg-gradient-to-r from-blue-600 to-cyan-600 px-6 py-4">
                        <h2 class="text-xl font-bold text-white">Recent Bids</h2>
                    </div>
                    <div id="recentBids" class="p-4 max-h-96 overflow-y-auto">
                        <div class="text-center text-gray-400 py-8">Waiting for bids...</div>
                    </div>
                </div>
            </div>

            <!-- Teams Overview -->
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-gradient-to-r from-green-600 to-teal-600 px-6 py-4">
                    <h2 class="text-xl font-bold text-white">Teams Overview</h2>
                    <p class="text-green-100 text-sm">Live Budgets & Squad Status</p>
                </div>
                <div id="teamsOverview" class="p-4 max-h-[600px] overflow-y-auto space-y-3">
                    <div class="text-center text-gray-400 py-8">Loading teams...</div>
                </div>
            </div>
        </div>

        <div class="text-center mt-8">
            <a href="index.html" class="inline-flex items-center gap-2 bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-xl transition">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2QFOj9pHPdw4QRe4rwSzUvdaXPc7IPI8",
            authDomain: "ipl-auction-4f969.firebaseapp.com",
            databaseURL: "https://ipl-auction-4f969-default-rtdb.firebaseio.com",
            projectId: "ipl-auction-4f969",
            storageBucket: "ipl-auction-4f969.firebasestorage.app",
            messagingSenderId: "328599072004",
            appId: "1:328599072004:web:e60fd71ca57988bd86f451"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Listen to auction updates
        database.ref('current_auction').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('activePlayer').textContent = data.activePlayer || '—';
                document.getElementById('currentBid').textContent = `₹${((data.currentBid || 0) / 100000).toFixed(1)} Lakh`;
                const mins = Math.floor((data.timerRemaining || 0) / 60);
                const secs = (data.timerRemaining || 0) % 60;
                document.getElementById('timerValue').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                document.getElementById('highestBidder').textContent = data.highestBidderName || 'None';
            }
        });

        // Listen to teams data
        database.ref('teams').on('value', (snapshot) => {
            const teams = snapshot.val();
            if (teams) {
                const container = document.getElementById('teamsOverview');
                container.innerHTML = Object.values(teams).map(team => `
                    <div class="bg-gray-50 rounded-xl p-3 border-l-4" style="border-left-color: ${team.color || '#ccc'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-bold text-gray-800">${team.teamName}</h3>
                                <p class="text-xs text-gray-500">${team.shortName}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold text-green-600">₹${(team.budget / 10000000).toFixed(1)} Cr</p>
                                <p class="text-xs text-gray-400">${team.playersPurchased?.length || 0} players</p>
                            </div>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-1.5 mt-2">
                            <div class="h-1.5 rounded-full transition-all" style="width: ${(team.budget / 120000000) * 100}%; background-color: ${team.color || '#22c55e'}"></div>
                        </div>
                    </div>
                `).join('');
            }
        });

        // Listen to bids
        database.ref('bids').limitToLast(10).on('value', (snapshot) => {
            const bids = snapshot.val();
            if (bids) {
                const bidsArray = Object.values(bids).sort((a, b) => b.timestamp - a.timestamp);
                const container = document.getElementById('recentBids');
                container.innerHTML = bidsArray.map(bid => `
                    <div class="bid-update bg-gray-50 rounded-lg p-3 mb-2 flex justify-between items-center">
                        <div>
                            <span class="font-bold text-purple-600">${bid.teamName}</span>
                            <span class="text-gray-500 text-sm ml-2">bid for</span>
                            <span class="font-semibold">${bid.player}</span>
                        </div>
                        <div>
                            <span class="font-bold text-green-600">₹${(bid.amount / 100000).toFixed(1)} L</span>
                        </div>
                    </div>
                `).join('');
                if (bidsArray.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-8">No bids yet</div>';
                }
            }
        });
    </script>
</body>
</html>
